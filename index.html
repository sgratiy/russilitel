<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка русских слов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🇷🇺 Проверка русских слов</h1>
            <p class="subtitle">Определяет нерусские слова в тексте</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <label for="inputText">
                    <strong>Введите текст для проверки:</strong>
                </label>
                <textarea 
                    id="inputText" 
                    placeholder="Введите или вставьте текст здесь..."
                    rows="8"
                ></textarea>
                <button id="checkBtn" class="btn-primary">Проверить текст</button>
                <button id="clearBtn" class="btn-secondary">Очистить</button>
            </div>

            <div class="output-section">
                <div class="output-header">
                    <strong>Результат проверки:</strong>
                </div>
                <div id="output" class="output-box">
                    <p class="placeholder">Результат появится здесь...</p>
                </div>
                <div id="stats" class="stats"></div>
            </div>
        </div>

        <div class="info-box">
            <h3>ℹ️ Информация</h3>
            <ul>
                <li>Все слова, не найденные в русском словаре, будут <span class="underline-example">подчеркнуты</span></li>
                <li>Словарь содержит наиболее часто используемые русские слова</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
